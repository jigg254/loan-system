<!DOCTYPE html>
<html>
<head>
    <title>Add Borrower</title>
</head>
<body>

<h1>Add Borrower</h1>

<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Phone:</label><br>
    <input type="text" name="phone" required><br><br>

    <label>ID Number:</label><br>
    <input type="text" name="id_number" required><br><br>

    <label>Next of Kin:</label><br>
    <input type="text" name="next_of_kin" required><br><br>

    <label>Guarantor:</label><br>
    <input type="text" name="guarantor"><br><br>

    <label>Security / Collateral:</label><br>
    <input type="text" name="security"><br><br>

    <button type="submit">Add Borrower</button>
</form>
