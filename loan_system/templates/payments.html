<!DOCTYPE html>
<html>
<head>
    <title>All Payments</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>All Payments</h1>

<table>
    <tr>
        <th>Borrower</th>
        <th>Loan Amount</th>
        <th>Paid Amount</th>
        <th>Payment Date</th>
    </tr>

    {% for payment in payments %}
    <tr>
        <td>{{ payment.loan.borrower.name }}</td>
        <td>{{ payment.loan.total }}</td>
        <td>{{ payment.amount }}</td>
        <td>{{ payment.date.strftime('%Y-%m-%d') }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">Back to Dashboard</a>
<br>
<a href="/payment">Record New Payment</a>

</body>
</html>
